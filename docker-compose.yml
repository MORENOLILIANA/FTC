services:
  app:
    build: .
    container_name: nutricasa_app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - /var/www/vendor
    networks:
      - nutricasa_network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: nutricasa_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - nutricasa_network
    depends_on:
      - app

  certbot:
    image: certbot/certbot:latest
    container_name: nutricasa_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

  db:
    image: mysql:8.0
    container_name: nutricasa_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nutricasa
      MYSQL_USER: nutricasa_user
      MYSQL_PASSWORD: nutricasa2024
      MYSQL_ROOT_PASSWORD: root2024
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - nutricasa_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot2024"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer:latest
    container_name: nutricasa_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - nutricasa_network
    depends_on:
      db:
        condition: service_healthy

networks:
  nutricasa_network:
    driver: bridge

volumes:
  dbdata:
  certbot_www:
  certbot_certs:
